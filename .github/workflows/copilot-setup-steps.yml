name: "Copilot Setup Steps"

# Run automatically when the setup steps change so they can be validated, and
# allow manual runs from the repository's "Actions" tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` or Copilot will not pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: pip install -r requirements.txt

      - name: Install E2E (browser test) dependencies
        run: pip install -r requirements-e2e.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Verify setup
        run: pytest --co -q
