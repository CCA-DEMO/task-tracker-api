<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task Tracker</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1rem; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    input[type="text"] { flex: 1 1 auto; padding: 0.5rem; font-size: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li.task { padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 0.5rem; }
    #empty-state { color: #666; }
  </style>
</head>
<body>
  <main>
    <h1>Task Tracker</h1>

    <form id="add-form" data-testid="add-form">
      <input type="text" id="title" data-testid="title-input" aria-label="Task title" placeholder="Task title" required />
      <input type="text" id="description" data-testid="description-input" aria-label="Task description" placeholder="Description (optional)" />
      <button type="submit" data-testid="add-button">Add Task</button>
    </form>

    <p id="empty-state" data-testid="empty-state" hidden>No tasks yet. Add one above.</p>
    <ul id="task-list" data-testid="task-list"></ul>
  </main>

  <script>
    async function loadTasks() {
      const res = await fetch("/tasks");
      const tasks = await res.json();
      const list = document.getElementById("task-list");
      const empty = document.getElementById("empty-state");
      list.innerHTML = "";
      empty.hidden = tasks.length !== 0;
      for (const t of tasks) {
        const li = document.createElement("li");
        li.className = "task";
        li.dataset.testid = "task-item";
        li.textContent = t.description ? `${t.title} — ${t.description}` : t.title;
        list.appendChild(li);
      }
    }

    document.getElementById("add-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      if (!title) return;
      await fetch("/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description }),
      });
      e.target.reset();
      document.getElementById("title").focus();
      loadTasks();
    });

    loadTasks();
  </script>
</body>
</html>
